<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Athari is Adam's home for useful tools, playful systems, and digital experiments.">
    <meta name="theme-color" content="#050505">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://athari.dev/">
    <meta property="og:title" content="athari.dev — builds things with a pulse.">
    <meta property="og:description" content="Useful tools, playful systems, and digital experiments by Adam.">
    <meta property="og:image" content="https://athari.dev/og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@Adamonxai">
    <meta name="twitter:title" content="athari.dev — builds things with a pulse.">
    <meta name="twitter:description" content="Useful tools, playful systems, and digital experiments by Adam.">
    <meta name="twitter:image" content="https://athari.dev/og.png">
    <link rel="canonical" href="https://athari.dev/">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>athari.dev — builds things with a pulse.</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --text: #fafafa;
        --subtle: #a1a1aa;
        --muted: #52525b;
        --line: rgba(250, 250, 250, .1);
        --accent: #8b5cf6;
        --accent-rgb: 139, 92, 246;
        --mx: 50%;
        --my: 50%;
      }

      * { box-sizing: border-box; }

      html {
        min-width: 320px;
        background: var(--bg);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        color: var(--text);
        background: var(--bg);
        font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        position: fixed;
        z-index: -2;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          radial-gradient(circle 30rem at var(--mx) var(--my), rgba(var(--accent-rgb), .095), transparent 72%),
          radial-gradient(circle 36rem at 50% 50%, rgba(var(--accent-rgb), .035), transparent 72%);
        transition: background .55s ease;
      }

      body::after {
        position: fixed;
        z-index: 20;
        inset: 0;
        pointer-events: none;
        content: "";
        opacity: .055;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");
      }

      a { color: inherit; }
      button { color: inherit; font: inherit; }

      .ambient-word {
        position: fixed;
        z-index: -1;
        right: -2.5vw;
        bottom: -5vw;
        pointer-events: none;
        color: rgba(255, 255, 255, .018);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(8rem, 23vw, 27rem);
        font-weight: 800;
        letter-spacing: -.1em;
        line-height: .72;
        user-select: none;
      }

      .shell {
        display: grid;
        width: min(100% - 3rem, 70rem);
        min-height: 100svh;
        margin: 0 auto;
        grid-template-columns: minmax(17rem, .85fr) minmax(21rem, 1.15fr);
        align-items: center;
        gap: clamp(4rem, 10vw, 9rem);
        padding: clamp(3rem, 8vh, 6rem) 0;
      }

      .identity {
        opacity: 0;
        animation: arrive .75s cubic-bezier(.2,.8,.2,1) .05s forwards;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: .7rem;
        color: var(--text);
        font-size: 1rem;
        letter-spacing: -.035em;
        text-decoration: none;
      }

      .brand-dot {
        width: .48rem;
        height: .48rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 1.15rem rgba(var(--accent-rgb), .75);
        transition: background .4s ease, box-shadow .4s ease;
        animation: breathe 2.8s ease-in-out infinite;
      }

      h1 {
        max-width: 9ch;
        margin: clamp(2rem, 5vh, 3.8rem) 0 1.35rem;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(3.35rem, 6.3vw, 6.1rem);
        font-weight: 560;
        letter-spacing: -.075em;
        line-height: .91;
        text-wrap: balance;
      }

      h1 span {
        color: transparent;
        background: linear-gradient(100deg, #fff 8%, #bba7ff 52%, var(--accent) 92%);
        background-clip: text;
        -webkit-background-clip: text;
        transition: background .5s ease;
      }

      .intro {
        max-width: 31rem;
        margin: 0;
        color: var(--subtle);
        font-size: .88rem;
        line-height: 1.7;
        text-wrap: pretty;
      }

      .identity-meta {
        display: flex;
        align-items: center;
        gap: 1.4rem;
        margin-top: 2rem;
        color: var(--muted);
        font-size: .67rem;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .live-count {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        color: var(--subtle);
      }

      .live-count::before {
        width: .35rem;
        height: .35rem;
        border-radius: 50%;
        background: #7dff84;
        box-shadow: 0 0 .75rem rgba(125,255,132,.5);
        content: "";
      }

      .directory {
        width: 100%;
        opacity: 0;
        animation: arrive .75s cubic-bezier(.2,.8,.2,1) .16s forwards;
      }

      .directory-head,
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        color: var(--muted);
        font-size: .67rem;
        letter-spacing: .09em;
        text-transform: uppercase;
      }

      .directory-head {
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--line);
      }

      .project-list { counter-reset: projects; }

      .project {
        position: relative;
        counter-increment: projects;
        border-bottom: 1px solid var(--line);
      }

      .project::before {
        position: absolute;
        inset: 0;
        pointer-events: none;
        content: "";
        opacity: 0;
        background: linear-gradient(90deg, rgba(var(--project-rgb), .115), transparent 72%);
        transition: opacity .3s ease;
      }

      .project-link {
        position: relative;
        display: grid;
        min-height: 7.6rem;
        grid-template-columns: 2rem minmax(0, 1fr) auto;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem .2rem;
        text-decoration: none;
      }

      .project-link::after {
        position: absolute;
        right: 0;
        bottom: -1px;
        left: 0;
        height: 1px;
        content: "";
        background: var(--project-accent);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform .35s cubic-bezier(.2,.8,.2,1);
      }

      .project-index {
        align-self: start;
        padding-top: .28rem;
        color: var(--muted);
        font-size: .62rem;
      }

      .project-index::before { content: "0" counter(projects); }

      .project-name {
        display: block;
        color: #d4d4d8;
        font-size: clamp(1rem, 1.6vw, 1.15rem);
        letter-spacing: -.035em;
        transition: color .25s ease, transform .3s cubic-bezier(.2,.8,.2,1);
      }

      .project-description {
        display: block;
        max-width: 35rem;
        margin-top: .55rem;
        color: #62626b;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: .76rem;
        line-height: 1.5;
        transition: color .25s ease;
      }

      .project-meta {
        display: flex;
        align-items: center;
        gap: .8rem;
      }

      .project-status {
        color: var(--muted);
        font-size: .59rem;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .project-arrow {
        display: grid;
        width: 1.8rem;
        height: 1.8rem;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        color: var(--muted);
        font-size: .8rem;
        transition: color .25s ease, border-color .25s ease, transform .3s cubic-bezier(.2,.8,.2,1);
      }

      .project:hover::before,
      .project:focus-within::before { opacity: 1; }

      .project:hover .project-link::after,
      .project:focus-within .project-link::after { transform: scaleX(1); }

      .project:hover .project-name,
      .project:focus-within .project-name { color: var(--text); transform: translateX(.3rem); }

      .project:hover .project-description,
      .project:focus-within .project-description { color: var(--subtle); }

      .project:hover .project-arrow,
      .project:focus-within .project-arrow {
        color: var(--text);
        border-color: var(--project-accent);
        transform: translate(.15rem, -.15rem);
      }

      .project-link:focus-visible { outline: 1px solid var(--project-accent); outline-offset: 4px; }

      .future {
        display: flex;
        min-height: 4.8rem;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem .2rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: .7rem;
      }

      .future strong { color: #777780; font-weight: 400; }
      .future span:last-child { letter-spacing: .08em; text-transform: uppercase; }

      .footer {
        padding-top: 1.35rem;
        text-transform: none;
      }

      .socials { display: flex; align-items: center; gap: 1.25rem; }

      .social-link,
      .copy-link {
        position: relative;
        padding: 0;
        border: 0;
        color: var(--muted);
        background: none;
        text-decoration: none;
        cursor: pointer;
        transition: color .2s ease;
      }

      .social-link::after,
      .copy-link::after {
        position: absolute;
        right: 0;
        bottom: -.25rem;
        left: 0;
        height: 1px;
        content: "";
        background: currentColor;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform .25s ease;
      }

      .social-link:hover,
      .social-link:focus-visible,
      .copy-link:hover,
      .copy-link:focus-visible { color: var(--text); }

      .social-link:hover::after,
      .social-link:focus-visible::after,
      .copy-link:hover::after,
      .copy-link:focus-visible::after { transform: scaleX(1); }

      .social-link:focus-visible,
      .copy-link:focus-visible { outline: none; }

      .keyboard-hint {
        position: fixed;
        right: 1.5rem;
        bottom: 1.25rem;
        color: #36363d;
        font-size: .58rem;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      .keyboard-hint kbd {
        padding: .18rem .3rem;
        border: 1px solid #29292e;
        border-radius: .2rem;
        color: #5c5c65;
        font: inherit;
      }

      @keyframes arrive {
        from { opacity: 0; transform: translateY(1rem); filter: blur(5px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      @keyframes breathe { 50% { opacity: .55; transform: scale(.72); } }

      @media (max-width: 800px) {
        .shell {
          width: min(100% - 2.25rem, 38rem);
          min-height: auto;
          grid-template-columns: 1fr;
          align-items: start;
          gap: 4.5rem;
          padding: 4rem 0 2rem;
        }

        h1 { margin-top: 3.4rem; }
        .keyboard-hint { display: none; }
        .ambient-word { bottom: 2rem; }
      }

      @media (max-width: 480px) {
        .shell { width: calc(100% - 2rem); padding-top: 2rem; }
        h1 { font-size: clamp(3.2rem, 16vw, 4.65rem); }
        .project-link { grid-template-columns: 1.5rem minmax(0, 1fr) auto; gap: .65rem; }
        .project-status { display: none; }
        .project-description { max-width: 30ch; }
        .footer { align-items: flex-end; }
        .socials { flex-direction: column; align-items: flex-start; gap: .65rem; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient-word" aria-hidden="true">A</div>
    <main class="shell">
      <section class="identity" aria-labelledby="hero-title">
        <a class="brand" href="/" aria-label="athari.dev home">
          <span class="brand-dot" aria-hidden="true"></span>
          <span>athari.dev</span>
        </a>
        <h1 id="hero-title">builds things <span>with a pulse.</span></h1>
        <p class="intro">Adam's home for useful tools, playful systems, and digital experiments—made with care, shipped to the web.</p>
        <div class="identity-meta">
          <span class="live-count"><span id="project-count">02</span> live projects</span>
          <span>Jerusalem</span>
        </div>
      </section>

      <section class="directory" aria-labelledby="projects-title">
        <div class="directory-head">
          <span id="projects-title">selected work</span>
          <span>↘ explore</span>
        </div>
        <div class="project-list" id="project-list"></div>
        <div class="future">
          <strong>more ideas are taking shape</strong>
          <span>next / soon</span>
        </div>
        <footer class="footer">
          <div class="socials">
            <a class="social-link" href="https://x.com/Adamonxai" target="_blank" rel="me noopener noreferrer">x / @Adamonxai ↗</a>
            <button class="copy-link" id="copy-link" type="button">copy link</button>
          </div>
          <time id="clock" title="Local time in Jerusalem">--:--</time>
        </footer>
      </section>
    </main>

    <div class="keyboard-hint" aria-hidden="true"><kbd>j</kbd> <kbd>k</kbd> navigate · <kbd>enter</kbd> open</div>

    <script src="/projects.js"></script>
    <script>
      const projects = window.ATHARI_PROJECTS || [];
      const list = document.getElementById('project-list');
      const root = document.documentElement;
      const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

      const escapeHtml = (value) => String(value).replace(/[&<>'"]/g, (character) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      })[character]);

      const hexToRgb = (hex) => {
        const value = hex.replace('#', '');
        const numeric = Number.parseInt(value.length === 3 ? value.split('').map((x) => x + x).join('') : value, 16);
        return `${numeric >> 16}, ${(numeric >> 8) & 255}, ${numeric & 255}`;
      };

      projects.forEach((project) => {
        const item = document.createElement('article');
        item.className = 'project';
        item.style.setProperty('--project-accent', project.accent);
        item.style.setProperty('--project-rgb', hexToRgb(project.accent));
        item.dataset.accent = project.accent;
        item.dataset.rgb = hexToRgb(project.accent);
        item.innerHTML = `
          <a class="project-link" href="${escapeHtml(project.url)}" aria-label="Open ${escapeHtml(project.name)}">
            <span class="project-index" aria-hidden="true"></span>
            <span>
              <span class="project-name">${escapeHtml(project.name)}</span>
              <span class="project-description">${escapeHtml(project.description)}</span>
            </span>
            <span class="project-meta">
              <span class="project-status">${escapeHtml(project.status)}</span>
              <span class="project-arrow" aria-hidden="true">↗</span>
            </span>
          </a>`;
        list.appendChild(item);
      });

      const links = [...document.querySelectorAll('.project-link')];
      document.getElementById('project-count').textContent = String(projects.length).padStart(2, '0');

      const setAccent = (item) => {
        root.style.setProperty('--accent', item.dataset.accent);
        root.style.setProperty('--accent-rgb', item.dataset.rgb);
      };

      document.querySelectorAll('.project').forEach((item) => {
        item.addEventListener('pointerenter', () => setAccent(item));
        item.addEventListener('focusin', () => setAccent(item));
      });

      if (!reduceMotion) {
        addEventListener('pointermove', (event) => {
          root.style.setProperty('--mx', `${event.clientX}px`);
          root.style.setProperty('--my', `${event.clientY}px`);
        }, { passive: true });
      }

      let activeIndex = -1;
      addEventListener('keydown', (event) => {
        if (!links.length || /input|textarea|select/i.test(document.activeElement.tagName)) return;
        if (event.key.toLowerCase() === 'j' || event.key === 'ArrowDown') {
          event.preventDefault();
          activeIndex = (activeIndex + 1) % links.length;
          links[activeIndex].focus();
        }
        if (event.key.toLowerCase() === 'k' || event.key === 'ArrowUp') {
          event.preventDefault();
          activeIndex = (activeIndex - 1 + links.length) % links.length;
          links[activeIndex].focus();
        }
      });

      const copyButton = document.getElementById('copy-link');
      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText('https://athari.dev/');
          copyButton.textContent = 'copied ✓';
          setTimeout(() => { copyButton.textContent = 'copy link'; }, 1800);
        } catch {
          copyButton.textContent = 'athari.dev';
        }
      });

      const updateClock = () => {
        document.getElementById('clock').textContent = new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit', hour12: false
        }).format(new Date());
      };

      updateClock();
      setInterval(updateClock, 30000);
    </script>
  </body>
</html>
