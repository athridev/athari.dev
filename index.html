<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="athari.dev" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>athari.dev</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        display: grid;
        place-items: center;
        background: #000;
        color: #46f27a;
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
        overflow: hidden;
      }
      /* Faint scanlines, very quiet. */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.25) 0 1px, transparent 1px 3px);
        pointer-events: none;
      }
      main { text-align: center; padding: 24px; }
      .logo {
        font-size: clamp(2.2rem, 8vw, 4.6rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #eafbe7;
        text-shadow: 0 0 18px rgba(70, 242, 122, 0.35);
      }
      .logo em { font-style: normal; color: #46f27a; }
      .line {
        margin-top: 22px;
        min-height: 1.4em;
        font-size: clamp(0.95rem, 2.6vw, 1.25rem);
        letter-spacing: 0.12em;
        color: rgba(70, 242, 122, 0.85);
      }
      .cursor {
        display: inline-block;
        width: 0.55em;
        height: 1.1em;
        margin-left: 2px;
        background: #46f27a;
        vertical-align: text-bottom;
        animation: blink 1.05s steps(1) infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .cursor { animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="logo">athari<em>.dev</em></p>
      <p class="line" aria-label="welcome to the matrix"><span id="typed"></span><span class="cursor"></span></p>
    </main>
    <script>
      const text = "welcome to the matrix";
      const out = document.getElementById("typed");
      const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduce) {
        out.textContent = text;
      } else {
        let i = 0;
        (function type() {
          if (i <= text.length) {
            out.textContent = text.slice(0, i++);
            setTimeout(type, 46 + Math.random() * 70);
          }
        })();
      }
    </script>
  </body>
</html>
