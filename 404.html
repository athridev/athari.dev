<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Athari.dev</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    .nf-code {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 1;
      background: linear-gradient(120deg, var(--gold-bright), var(--gold) 60%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .nf h1 { font-size: clamp(22px, 3vw, 30px); margin-bottom: 12px; }
    .nf p { color: var(--text-dim); margin-bottom: 36px; max-width: 44ch; }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <main class="nf">
    <div class="nf-code">404</div>
    <h1>No signal here.</h1>
    <p>The page you're looking for doesn't exist or has moved. The signal continues on the homepage.</p>
    <a href="/" class="btn btn-gold">Back to Athari.dev</a>
  </main>
</body>
</html>
